<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paint Pro iPad (Pressure)</title>
    <style>
        body { font-family: sans-serif; margin: 0; overflow: hidden; background: #222; touch-action: none; }
        .controles { 
            background: #333; color: white; padding: 10px; 
            display: flex; justify-content: center; gap: 15px; 
            align-items: center; border-bottom: 1px solid #444;
        }
        canvas { background: white; touch-action: none; display: block; }
        label { font-size: 12px; }
        button { padding: 8px 12px; border-radius: 4px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="controles">
        <input type="color" id="cor" value="#000000">
        <label>Sensibilidade: <input type="range" id="tamanhoBase" min="1" max="50" value="10"></label>
        <button id="limpar" style="background: #ff4d4d; color: white;">Limpar</button>
        <div id="status" style="font-size: 10px; color: #aaa;">Pressão: 0%</div>
    </div>

    <canvas id="tela"></canvas>

    <script>
        const canvas = document.getElementById('tela');
        const ctx = canvas.getContext('2d');
        const corInput = document.getElementById('cor');
        const tamanhoBase = document.getElementById('tamanhoBase');
        const status = document.getElementById('status');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 60;

        let desenhando = false;
        let ultimaPos = { x: 0, y: 0 };

        // O segredo está no 'pointerdown' e 'pointermove'
        canvas.addEventListener('pointerdown', (e) => {
            desenhando = true;
            ultimaPos = obterPosicao(e);
            e.preventDefault();
        });

        window.addEventListener('pointermove', (e) => {
            if (!desenhando) return;

            const pos = obterPosicao(e);
            
            // Lógica de Pressão: 
            // Se e.pressure for 0 (alguns dispositivos), definimos um padrão de 0.5
            const pressao = e.pressure > 0 ? e.pressure : 0.5;
            
            // Mostra a pressão no painel para teste
            status.innerText = `Pressão: ${Math.round(pressao * 100)}%`;

            ctx.beginPath();
            ctx.strokeStyle = corInput.value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // A mágica: Tamanho Base x Pressão da Caneta
            ctx.lineWidth = tamanhoBase.value * pressao;

            ctx.moveTo(ultimaPos.x, ultimaPos.y);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();

            ultimaPos = pos;
            e.preventDefault();
        });

        window.addEventListener('pointerup', () => {
            desenhando = false;
            status.innerText = "Pressão: 0%";
        });

        function obterPosicao(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        document.getElementById('limpar').onclick = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        };
    </script>
</body>
</html>
