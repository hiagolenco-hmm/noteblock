<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de HTML Online</title>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #333; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Área de digitação */
        #codigo { 
            flex-grow: 1; width: 100%; border: none; padding: 20px; 
            background: #1e1e1e; color: #d4d4d4; font-size: 16px; 
            resize: none; outline: none; box-sizing: border-box;
        }

        .btn-exportar { 
            background: #007acc; color: white; border: none; 
            padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .btn-exportar:hover { background: #005f9e; }
        
        .instrucao { font-size: 12px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <strong>EDITOR .HTML</strong>
            <div class="instrucao">Escreva seu código abaixo e baixe o arquivo</div>
        </div>
        <button class="btn-exportar" onclick="baixarHTML()">Exportar Arquivo .html</button>
    </div>

    <textarea id="codigo" spellcheck="false" placeholder="<html>
<body>
  <h1>Olá Mundo!</h1>
</body>
</html>"></textarea>

    <script>
        function baixarHTML() {
            const texto = document.getElementById('codigo').value;
            
            if (!texto.trim()) {
                alert("Escreva algum código antes de exportar!");
                return;
            }

            // Criando o arquivo blob como HTML
            const blob = new Blob([texto], { type: 'text/html' });
            const url = window.URL.createObjectURL(blob);
            
            // Criando o link de download
            const link = document.createElement('a');
            link.href = url;
            link.download = "projeto.html"; // Nome do arquivo que será baixado
            
            // Acionando o download
            document.body.appendChild(link);
            link.click();
            
            // Limpeza
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);
        }

        // Atalho: Salvar com Ctrl+S ou Cmd+S
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                baixarHTML();
            }
        });
    </script>
</body>
</html>
