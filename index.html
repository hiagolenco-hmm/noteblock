<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Editor de Texto</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .toolbar { background: #333; padding: 10px; border-radius: 8px 8px 0 0; width: 90%; max-width: 800px; display: flex; gap: 10px; flex-wrap: wrap; }
        .editor { 
            background: white; border: 1px solid #ccc; width: 90%; max-width: 800px; min-height: 400px; 
            padding: 20px; border-radius: 0 0 8px 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            outline: none; font-size: 16px; line-height: 1.5;
        }
        button { 
            padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; 
            background: #555; color: white; font-weight: bold; transition: 0.3s;
        }
        button:hover { background: #777; }
        .btn-save { background: #28a745; }
        .btn-save:hover { background: #218838; }
    </style>
</head>
<body>

    <h2 style="color: #333;">📝 Web Text Editor</h2>

    <div class="toolbar">
        <button onclick="executar('bold')">B</button>
        <button onclick="executar('italic')"><i>I</i></button>
        <button onclick="executar('underline')"><u>U</u></button>
        
        <div style="flex-grow: 1;"></div> <button class="btn-save" onclick="exportar('txt')">Exportar .TXT</button>
        <button class="btn-save" onclick="exportar('html')">Exportar .HTML</button>
    </div>

    <div id="editor" class="editor" contenteditable="true" placeholder="Comece a escrever aqui..."></div>

    <script>
        // Função para formatar o texto selecionado
        function executar(comando) {
            document.execCommand(comando, false, null);
        }

        function exportar(formato) {
            const editor = document.getElementById('editor');
            let conteudo = "";
            let nomeArquivo = "meu-documento";

            if (formato === 'txt') {
                // Pega apenas o texto, ignorando tags HTML
                conteudo = editor.innerText;
                nomeArquivo += ".txt";
            } else {
                // Pega o conteúdo com as tags (negrito, itálico, etc)
                conteudo = `
<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Documento Exportado</title></head>
<body>${editor.innerHTML}</body>
</html>`;
                nomeArquivo += ".html";
            }

            // Cria o arquivo para download
            const blob = new Blob([conteudo], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            
            a.href = url;
            a.download = nomeArquivo;
            a.click(); // Simula o clique de download
            
            window.URL.revokeObjectURL(url); // Limpa a memória
        }
    </script>
</body>
</html>
